<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Phase 1">
  <meta name="theme-color" content="#7B3FA0">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <title>Phase 1</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#17171c;font-family:Outfit,sans-serif;color:#fff;max-width:480px;margin:0 auto}
    input,textarea{font-family:Outfit,sans-serif;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:4px;color:rgba(255,255,255,0.8);font-size:15px;padding:8px 10px;width:100%;outline:none;box-sizing:border-box}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    input[type=number]{-moz-appearance:textfield}
    textarea{resize:none;min-height:36px;font-size:12px}
    .card{background:rgba(255,255,255,0.018);border:1px solid rgba(255,255,255,0.035);border-radius:8px;padding:12px;margin-bottom:8px}
    .sh{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:rgba(190,155,80,0.7);letter-spacing:1.5px;margin-bottom:8px}
    .lb{font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1px;display:block;margin-bottom:4px}
    .tb{flex:1;padding:7px;background:transparent;color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.06);border-radius:4px;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:0.8px}
    .tb.on{background:rgba(190,155,80,0.1);color:#BE9B50;border-color:rgba(190,155,80,0.2)}
    .chk{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:1px}
    .chk.dn{background:rgba(190,155,80,0.04)}
    .cb{width:15px;height:15px;border-radius:3px;border:1.5px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cb.dn{border-color:#BE9B50;background:#BE9B50}
    .cn{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:1.5px}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
    .iw{position:relative}
    .iu{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-size:8px;color:rgba(255,255,255,0.12)}
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'))
    }
  </script>
</body>
</html>
